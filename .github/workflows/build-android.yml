name: Build Android APK (final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor Android
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build React app
        run: npm run build

      - name: Init Capacitor
        run: npx cap init CQApp com.cqlab.app --web-dir=dist

      - name: Add Android platform
        run: npx cap add android

      - name: Criar todos os recursos Android e corrigir conflitos Kotlin
        run: |
          # Remove package do manifest (conflito com namespace)
          sed -i 's/package="com.cqlab.app"//' android/app/src/main/AndroidManifest.xml

          # Garante que o MainActivity use a classe correta do Capacitor
          cat > android/app/src/main/java/com/cqlab/app/MainActivity.java << 'EOF'
          package com.cqlab.app;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {}
          EOF

          # Cria strings.xml com todos os textos necessários
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">CQLab</string>
              <string name="title_activity_main">CQLab</string>
          </resources>
          EOF

          # Cria cores
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6200EE</color>
              <color name="colorPrimaryDark">#3700B3</color>
              <color name="colorAccent">#03DAC5</color>
          </resources>
          EOF

          # Cria estilos
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                  <item name="android:background">@color/colorPrimary</item>
              </style>
              <style name="Theme.SplashScreen" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@color/colorPrimary</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          # Adiciona dependência do Capacitor no app/build.gradle
          sed -i '/dependencies {/a\    implementation project(":capacitor-android")' android/app/build.gradle

          # Cria ícones placeholder
          mkdir -p android/app/src/main/res/mipmap-hdpi
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # Configura o build.gradle da raiz para forçar versões do Kotlin e resolver conflitos
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
                  }
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # No app/build.gradle, adicionamos a exclusão de dependências conflitantes
          cat >> android/app/build.gradle << 'EOF'
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          EOF

      - name: Sync Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cqlab-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
