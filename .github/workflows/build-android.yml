name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android
        
      - name: Build React app
        run: npm run build
        
      - name: Init Capacitor
        run: npx cap init CQLab com.cqlab.app --web-dir=dist
        
      - name: Add Android platform
        run: npx cap add android
        
      - name: Fix Kotlin version conflict
        run: |
          # Cria build.gradle na raiz do Android com resolução de versões
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
                  }
              }
          }
          EOF
          
      - name: Sync Android
        run: npx cap sync android
        
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cqlab-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
